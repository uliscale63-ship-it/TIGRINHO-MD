    <style>
        /* Fundo escuro */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 998;

            .toast {
                animation: pop 0.4s ease;
            }

            @keyframes pop {
                0% {
                    transform: translate(-50%, -60%) scale(0.7);
                    opacity: 0;
                }

                100% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 1;
                }
            }
        }

        @keyframes tigerDance {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(5px, -5px);
            }

            50% {
                transform: translate(0, 5px);
            }

            75% {
                transform: translate(-5px, -5px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .tiger-anim {
            animation: tigerDance 1s infinite ease-in-out;
        }

        @keyframes scrollText {
            0% {
                transform: translateX(80%);
            }

            100% {
                transform: translateX(-80%);
            }
        }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            animation: scrollText 10s linear infinite;
        }

        .play-btn {
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px lime;
        }

        .play-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

    <style>
        /* Confete */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: red;
            top: 0;
            animation: fall 3s linear infinite;
            z-index: 9999;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0);
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* Notificação estilosa */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, gold, orange);
            color: black;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 9999;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

    <script>

        document.addEventListener("DOMContentLoaded", () => {
            let rodadaAtual = 0;
            let derrotas = 0;
            const maxRodadas = 10;
            const maxDerrotas = 2;
            const resultadosRodadas = [
                { tipo: "ganho", valor: 8500 },   // 1
                { tipo: "perda" },                // 2
                { tipo: "ganho", valor: 15000 },   // 3
                { tipo: "ganho", valor: 23000 },  // 4
                { tipo: "perda" },                // 5
                { tipo: "ganho", valor: 12000 },  // 6
                { tipo: "ganho", valor: 18000 },  // 7
                { tipo: "ganho", valor: 22000 },  // 8
                { tipo: "perda" },                // 9
                { tipo: "ganho", valor: 22500 }   // 10
            ];
            let saldoZeroAcumulado = 0;

            const emojis = ["🐅", "💰", "🏮", "🔔", "🍀", "⭐"];
            const slots = Array.from({ length: 9 }, (_, i) => document.getElementById(`slot${i + 1}`));
            const playBtn = document.getElementById("playBtn");
            const sacarBtn = document.getElementById("sacarBtn");

            const somClick = document.getElementById("somClick");
            const somCassino = document.getElementById("somCassino");
            const somVitoria = document.getElementById("somVitoria");
            const somDerrota = document.getElementById("somDerrota");

            // Som nos botões menores
            document.querySelectorAll("button").forEach(btn => {
                if (btn.id !== "playBtn") {
                    btn.addEventListener("click", () => {
                        somClick.currentTime = 0;
                        somClick.play().catch(() => { });
                    });
                }
            });

            function atualizarTodosSaldos() {
                document.getElementById("saldoTopo").textContent = saldoZeroAcumulado + " Kz";
                document.getElementById("saldoBox").textContent = saldoZeroAcumulado + " Kz";
            }
            function atualizarGanhos(valorAtual) {
                document.getElementById("ganhoBox").textContent = valorAtual + " Kz";
            }
            function atualizarRodadas() {
                const rodadasEl = document.querySelector("div span");
                if (rodadasEl) rodadasEl.innerText = `${rodadaAtual}/${maxRodadas}`;
            }

            function mostrarNotificacao(texto, ganhou = true) {
                const overlay = document.createElement("div");
                overlay.className = "overlay";
                document.body.appendChild(overlay);

                const toast = document.createElement("div");
                toast.className = "toast";
                toast.style.position = "fixed";
                toast.style.top = "50%";
                toast.style.left = "50%";
                toast.style.transform = "translate(-50%, -50%)";
                toast.style.padding = "20px 30px";
                toast.style.borderRadius = "15px";
                toast.style.fontSize = "20px";
                toast.style.fontWeight = "bold";
                toast.style.background = "none";
                toast.style.color = ganhou ? "#00ff88" : "#ff2b2b";
                toast.style.textShadow = ganhou ? "0 0 20px #00ff88, 0 0 40px #00ff88" : "0 0 20px #ff2b2b, 0 0 40px #ff2b2b";
                toast.style.boxShadow = ganhou ? "0 0 30px #00ff88" : "0 0 30px #ff2b2b";
                toast.textContent = texto;
                document.body.appendChild(toast);

                if (ganhou) {
                    for (let i = 0; i < 30; i++) {
                        const confete = document.createElement("div");
                        confete.className = "confetti";
                        confete.style.background = `hsl(${Math.random() * 360},100%,50%)`;
                        confete.style.left = Math.random() * window.innerWidth + "px";
                        document.body.appendChild(confete);
                        setTimeout(() => confete.remove(), 4000);
                    }
                }

                setTimeout(() => { toast.remove(); overlay.remove(); }, 3000);
            }

            playBtn.addEventListener("click", () => {
                if (rodadaAtual >= maxRodadas) return;

                rodadaAtual++;
                atualizarRodadas();
                playBtn.innerHTML = "...";
                playBtn.disabled = true;
                somCassino.currentTime = 0;
                somCassino.play().catch(() => { });

                let velocidade = 100;
                const interval = setInterval(() => {
                    slots.forEach(slot => slot.textContent = emojis[Math.floor(Math.random() * emojis.length)]);
                    velocidade += 20;
                }, velocidade);

                setTimeout(() => {
                    clearInterval(interval);

                    // Determinar vitória ou derrota

                    const resultado = resultadosRodadas[rodadaAtual - 1];

                    if (resultado.tipo === "ganho") {
                        const simbolo = emojis[Math.floor(Math.random() * emojis.length)];
                        slots.forEach(slot => slot.textContent = simbolo);
                    } else {
                        slots.forEach(slot => {
                            let rand;
                            do {
                                rand = emojis[Math.floor(Math.random() * emojis.length)];
                            } while (rand === slots[0].textContent);
                            slot.textContent = rand;
                        });
                    }

                    somCassino.pause(); somCassino.currentTime = 0;

                    const linhas = [
                        [slots[0], slots[1], slots[2]],
                        [slots[3], slots[4], slots[5]],
                        [slots[6], slots[7], slots[8]]
                    ];

                    let venceu = false;
                    linhas.forEach(linha => {
                        const first = linha[0].textContent;
                        if (linha.every(slot => slot.textContent === first)) venceu = true;
                    });

                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

                    if (venceu) {

                        somVitoria.currentTime = 0; somVitoria.play();

                        saldoZeroAcumulado += resultado.valor;

                        // saldo continua acumulando (normal)
                        document.getElementById("saldoTopo").textContent = saldoZeroAcumulado + " Kz";
                        document.getElementById("saldoBox").textContent = saldoZeroAcumulado + " Kz";

                        // 👇 ganho mostra só o valor da rodada (NÃO soma)
                        atualizarGanhos(resultado.valor);
                        mostrarNotificacao(`🎉 Parabéns! Você ganhou +${resultado.valor} Kz 🎉`, true);
                    } else {
                        derrotas++;
                        somDerrota.currentTime = 0; somDerrota.play();
                        if (derrotas >= maxDerrotas) {
                            mostrarNotificacao("😢 Que pena, você perdeu!", false);
                            playBtn.disabled = true;
                        }
                    }

                    playBtn.innerHTML = "JOGAR";
                    playBtn.disabled = false;

                    // MOSTRAR SACAR AGORA apenas na rodada 10
                    if (rodadaAtual === maxRodadas) {
                        sacarBtn.style.display = "block";
                    }

                }, 2000);
            });


            // Ação do botão sacar
            sacarBtn.addEventListener("click", () => {
                // Redireciona para a página desejada na mesma aba
                window.location.href = "witdraw.html"; // <-- coloque aqui sua URL
            });

        });

        // Botão SACAR AGORA
        const sacarBtn = document.getElementById("sacarBtn");
        sacarBtn.style.display = "none"; // escondido inicialmente

        // Mostrar na rodada 10
        if (rodadaAtual === maxRodadas) {
            sacarBtn.style.display = "block";
        }

        // Redirecionar ao clicar
        sacarBtn.addEventListener("click", () => {
            window.location.href = "witdraw.html"; // alterar para a página desejada
        });

        // =========================
        btn.addEventListener("mouseenter", () => {
            btn.style.transform = "scale(1.05)";
            btn.style.boxShadow = "0 0 45px rgba(255,215,0,0.9)";
        });

        btn.addEventListener("mouseleave", () => {
            btn.style.transform = "scale(1)";
            btn.style.boxShadow = "0 0 25px rgba(255,215,0,0.5)";
        });

        btn.addEventListener("mousedown", () => {
            btn.style.transform = "scale(0.95)";
        });

        btn.addEventListener("mouseup", () => {
            btn.style.transform = "scale(1.05)";
        });



    </script>



</body>

</html>
