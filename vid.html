<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App do tigre Ao</title>
    <meta name="description" content="Acessse o link">
    <meta name="author" content="Lovable">
    <link rel="stylesheet" href="indexa.css">
</head>

<body>

    <div class="min-h-screen flex flex-col items-center px-4 py-8" style="background: rgb(16, 19, 24);">

        <h1 style="color: gold; text-align:center;">
            ASSISTA O VÍDEO ABAIXO PARA VER COMO RECEBER O SEU DINHEIRO AGORA MESMO
        </h1>

        <!-- ✅ VÍDEO AGORA EM FORMATO VERTICAL -->
        <!-- ✅ VÍDEO AGORA FUNCIONAL -->
<div style="width:100%; max-width:500px; aspect-ratio: 9/16; margin-top:20px;">
    <iframe 
        src="https://player-vz-4838aea6-b12.tv.pandavideo.com/embed/?v=00b91515-0e08-4df7-8c73-ea6d2f8dd282"
        style="width:100%; height:100%; border:none;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>

        <!-- BOTÃO (mantido igual) -->
        <div id="cta-container" style="display: none; text-align: center; margin-top: 20px;">
            <a href="checkaut.html" class="cta-btn">
                💰 Pagar Taxa Anti-Robô
            </a>
        </div>

    </div>

    <!-- CONTADOR ONLINE -->
    <div id="online-box">👥 <span id="online-count">127</span> pessoas online agora</div>

    <!-- NOTIFICAÇÃO -->
    <div id="notif-wpp" class="notif-wpp">
        <div class="emoji">✅</div>
        <div class="notif-texto">
            <strong id="notif-nome"></strong>
            <span id="notif-msg"></span>
        </div>
    </div>

    <style>
        .cta-btn {
            display: inline-block;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.6);
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: scale(1.08);
        }

        #online-box {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #111;
            color: #00ff00;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
        }

        .notif-wpp {
            position: fixed;
            top: 70px;
            right: 10px;
            background: #000;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
    </style>

    <script>
        // MOSTRAR BOTÃO APÓS 6min27s
        setTimeout(function () {
            document.getElementById("cta-container").style.display = "block";
        }, 387000);

        // CONTADOR ONLINE
        function atualizarOnline() {
            const numero = Math.floor(Math.random() * (320 - 120)) + 120;
            document.getElementById("online-count").innerText = numero;
        }
        setInterval(atualizarOnline, 3000);

        // NOTIFICAÇÕES
        const pessoas = ["Carlos", "Ana", "Domingos", "Edna"];
        const provincias = ["Luanda", "Benguela", "Huambo"];

        function mostrarNotif() {
            const nome = pessoas[Math.floor(Math.random() * pessoas.length)];
            const provincia = provincias[Math.floor(Math.random() * provincias.length)];

            document.getElementById("notif-nome").innerText = nome;
            document.getElementById("notif-msg").innerText =
                " acabou de levantar dinheiro em " + provincia;

            const box = document.getElementById("notif-wpp");
            box.style.display = "block";

            setTimeout(() => {
                box.style.display = "none";
            }, 4000);
        }

        setInterval(mostrarNotif, 8000);
    </script>

</body>

</html>
