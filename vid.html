    <style>
        /* BOTÃO PREMIUM */
        .cta-btn {
            display: inline-block;
            padding: 18px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.6);
            transition: all 0.3s ease;
            animation: pulseGlow 2s infinite;
        }

        /* HOVER */
        .cta-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
        }

        /* ANIMAÇÃO GLOW */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
            }

            50% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 1);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
            }
        }



        .notif-wpp {
            position: fixed;
            top: 0;
            /* inicia do topo */
            top: 6rem;
            size: 30px;
            right: 1px;
            background: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px;
            /* padding reduzido */
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(12, 176, 67, 0.6);
            width: 250px;
            height: 50px;
            display: none;
            z-index: 9999;

            /* começa escondido acima */
            transform: translateY(-100%);
            opacity: 0;
        }

        .notif-show {
            animation: descer 0.5s ease forwards;
        }

        .notif-hide {
            animation: subir 0.5s ease forwards;
        }

        @keyframes descer {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(10rem);
                /* desce até 10rem do topo */
                opacity: 1;
            }
        }

        @keyframes subir {
            from {
                transform: translateY(10rem);
                opacity: 1;
            }

            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }


        .notif-show {
            animation: descer 0.5s ease forwards;
        }

        @keyframes descer {
            from {
                transform: translateY(-80px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .notif-hide {
            animation: subir 0.5s ease forwards;
        }

        @keyframes subir {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(-80px);
                opacity: 0;
            }
        }

        .emoji {
            font-size: 10px;

        }


        .notif-texto {
            display: flex;
            flex-direction: column;
            font-size: 10px;
        }

        .notif-texto strong {
            font-size: 14px;
            color: #25D366;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 30px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }


        /* HOVER */
        .cta-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
        }

        /* ANIMAÇÃO GLOW */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
            }

            50% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 1);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
            }
        }







        /* EMOJI PISCANDO */
        .emoji {
            font-size: 28px;
            animation: piscar 1s infinite;
        }

        @keyframes piscar {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {

            }

        /* CONTADOR ONLINE */

            position: fixed;
            top: 1px;

            color: #00ff00;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            z-index: 9999;
        }
    </style>

    <script>
        const pessoas = [
            { nome: "Carlos" },
            { nome: "Ana" },
            { nome: "Domingos" },
            { nome: "Edna" },
            { nome: "Manuel" },
            { nome: "Fátima" }
        ];

        const provincias = [
            "Luanda", "Benguela", "Huambo", "Huíla",
            "Huambo", "Malanje"
        ];

        // VALORES FIXOS NA ORDEM
        const valores = [100000, 87000, 67000, 150000, 49000, 32000, 89000];

        let indexValor = 0;

        function formatarKz(valor) {
            return valor.toLocaleString('pt-PT') + " Kz";
        }

        function mostrarNotif() {
            const pessoa = pessoas[Math.floor(Math.random() * pessoas.length)];
            const provincia = provincias[Math.floor(Math.random() * provincias.length)];

            const valor = valores[indexValor];
            indexValor = (indexValor + 1) % valores.length;

            document.getElementById("notif-nome").innerText = pessoa.nome;
            document.getElementById("notif-msg").innerText =
                `da província de ${provincia} acabou de levantar ${formatarKz(valor)}`;

            const box = document.getElementById("notif-wpp");

            box.style.display = "flex";
            box.classList.remove("notif-hide");
            box.classList.add("notif-show");

            setTimeout(() => {
                box.classList.remove("notif-show");
                box.classList.add("notif-hide");

                setTimeout(() => {
                    box.style.display = "none";
                }, 500);
            }, 4000);
        }
        // CONTADOR ONLINE DINÂMICO
        function atualizarOnline() {
            const numero = Math.floor(Math.random() * (320 - 120)) + 120;
            document.getElementById("online-count").innerText = numero;
        }

        setInterval(atualizarOnline, 3000);

        // primeira notificação
        setTimeout(mostrarNotif, 5000);

        // repetir notificações
        setInterval(mostrarNotif, 8000);
    </script>
