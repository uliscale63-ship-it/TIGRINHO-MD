<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TODO: Set the document title to the name of your application -->
    <title>App do tigre Ao</title>
    <meta name="description" content="Acessse o link">
    <meta name="author" content="Lovable">
    <link rel="stylesheet" href="indexa.css">

</head>

<body>
    <div id="root">
        <div role="region" aria-label="Notifications (F8)" tabindex="-1" style="pointer-events: none;">
            <ol tabindex="-1"
                class="fixed top-0 z-[100] flex max-h-screen w-full flex-col-reverse p-4 sm:bottom-0 sm:right-0 sm:top-auto sm:flex-col md:max-w-[420px]">
            </ol>
        </div>
        <section aria-label="Notifications alt+T" tabindex="-1" aria-live="polite" aria-relevant="additions text"
            aria-atomic="false"></section>
        <div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden"
            style="width: 100%;">
            <div class="absolute inset-0"><img src="temple-bg-xbdkwM8g.jpg" alt="" class="w-full h-full object-cover">
                <div class="absolute inset-0"
                    style="background: linear-gradient(rgba(0, 0, 0, 0.3) 0%, rgba(139, 10, 10, 0.6) 50%, rgba(0, 0, 0, 0.85) 100%);">
                </div>
            </div>
            <div class=" fade-up z-10 w-full max-w-[380px] mx-auto px-6" style="border: 100%;">
                <div style="opacity: 1; transform: none; width: 100%;">
                    <div class="rounded-2xl p-6 text-center"
                        style=" width: 100%;background: linear-gradient(rgba(20, 5, 5, 0.92), rgba(10, 2, 2, 0.96)); border: 1px solid rgba(218, 165, 32, 0.3); box-shadow: rgba(0, 0, 0, 0.5) 0px 0px 40px;">
                        <div class="text-5xl mb-4">✅</div>
                        <h1 class="text-xl font-extrabold mb-1"
                            style="background: linear-gradient(rgb(33, 196, 93), rgb(22, 162, 73)) text; -webkit-text-fill-color: transparent;">
                            Dados verificados com sucesso</h1>
                        <p class="text-sm text-muted-foreground mb-4">Os seus dados foram validados</p>
                        <div class="my-4 h-px"
                            style="background: linear-gradient(90deg, transparent, rgba(218, 165, 32, 0.4), transparent);">
                        </div>
                        <p class="text-sm text-muted-foreground mt-4">Total disponível para levantamento</p>
                        <p class="text-4xl font-extrabold my-2"
                            style="background: linear-gradient(rgb(33, 196, 93), rgb(22, 162, 73)) text; -webkit-text-fill-color: transparent;">
                            121.000 Kz</p>
                        <div class="flex items-center gap-2 my-4 text-sm text-card-foreground">
                            <span id="tipoTexto" style="font-family: 'Times New Roman', Times, serif;font-size:10px; font-size: 
                                14px;">Dados bancários
                                💳: <p id="mostrarIban"></p> </span>
                        </div> <a href="vid.html"><button type="button"
                                class="w-full py-3.5 rounded-xl text-lg font-bold cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                                tabindex="0" id="hebo"
                                style="background: linear-gradient(135deg, rgb(255, 217, 0), rgb(220, 166, 30), rgb(255, 128, 0)); color: rgb(26, 5, 5); box-shadow: rgba(255, 215, 0, 0.55) 0px 0px 35px; transform: none;">💰
                                Levantar meus ganhos agora</button></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    const iban = localStorage.getItem("iban");
    document.getElementById("mostrarIban").textContent = iban;
</script>

</html>
