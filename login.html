            style="width: 100%;">
            <div class="absolute inset-0"><img src="temple-bg-xbdkwM8g.jpg" alt="" class="w-full h-full object-cover">
                <div class="absolute inset-0" V SXSZAFDSA \ \Qazsxwecrt rcedz \ Q
                    style="background: linear-gradient(rgba(0, 0, 0, 0.3) 0%, rgba(139, 10, 10, 0.6) 50%, rgba(0, 0, 0, 0.85) 100%);">
                </div>
            </div>
            <div class=" fade-up relative z-10 w-full max-w-[380px] mx-auto px-6" style="width: 100%;">
                <div style="opacity: 1; transform: none; width: 100%;">
                    <div class="rounded-2xl p-6 text-center"
                        style=" width: 100%;background: linear-gradient(rgba(20, 5, 5, 0.92), rgba(10, 2, 2, 0.96)); border: 1px solid rgba(218, 165, 32, 0.3); box-shadow: rgba(0, 0, 0, 0.5) 0px 0px 40px;">
                        <img src="tiger-header-B_edPfGx.png" alt="Fortune Tiger"
                            class="w-20 h-20 object-contain mx-auto mb-2 drop-shadow-2xl">
                        <h1 class="text-xl font-extrabold mb-1"
                            style="background: linear-gradient(rgb(255, 217, 0), rgb(220, 166, 30), rgb(255, 128, 0)) text; -webkit-text-fill-color: transparent;">
                            ENTRAR</h1>
                        <p class="text-xs text-muted-foreground mb-4">Acesse a sua conta Fortune Tiger</p>
                        <div class="my-4 h-px"
                            style="background: linear-gradient(90deg, transparent, rgba(218, 165, 32, 0.4), transparent);">
                        </div>
                        <form class="space-y-3 text-left"><input
                                class="w-full px-4 py-3 rounded-xl text-sm outline-none bg-[rgba(255,255,255,0.05)] border border-[rgba(218,165,32,0.25)] text-card-foreground placeholder:text-muted-foreground focus:border-[rgba(218,165,32,0.6)] transition-colors"
                                placeholder="Número de telefone" type="tel" required="" value="">
                            <div class="pt-2"> <button type="submit" id="playBtn"
                                    class="w-full py-3.5 rounded-xl text-lg font-bold cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                                    tabindex="0"
                                    style="background: linear-gradient(135deg, rgb(255, 217, 0), rgb(220, 166, 30), rgb(255, 128, 0)); color: rgb(26, 5, 5); box-shadow: rgba(255, 215, 0, 0.55) 0px 0px 35px; transform: none;">🐅
                                    Entrar</button></div>
                        </form>
                        <p class="text-xs text-muted-foreground mt-4">Não tem conta? <a class="underline"
                                href="register.html" style="color: rgb(220, 166, 30);">Registar</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
<script>
    document.addEventListener("DOMContentLoaded", () => {

        const btn = document.getElementById("playBtn");

        // =========================
        btn.style.opacity = "0";
        btn.style.transform = "scale(0.7) translateY(30px)";

        // =========================
        // ENTRADA ESTILOSA
        // =========================
        setTimeout(() => {
            btn.style.transition = "all 0.6s ease";
            btn.style.opacity = "1";
            btn.style.transform = "scale(1) translateY(0)";
        }, 400);

        // =========================
        // SOM AO CARREGAR
        // =========================
        setTimeout(() => {
            audio.play().catch(() => {
                console.log("Som bloqueado pelo navegador");
            });
        }, 300);

        // =========================
        // EFEITO HOVER
        // =========================
        btn.addEventListener("mouseenter", () => {
            btn.style.transform = "scale(1.08)";
            btn.style.boxShadow = "0 0 50px rgba(255,215,0,1)";
        });

        btn.addEventListener("mouseleave", () => {
            btn.style.transform = "scale(1)";
            btn.style.boxShadow = "0 0 35px rgba(255,215,0,0.5)";
        });

        // =========================
        // EFEITO CLICK
        // =========================
        btn.addEventListener("mousedown", () => {
            btn.style.transform = "scale(0.95)";
        });

        btn.addEventListener("mouseup", () => {
            btn.style.transform = "scale(1.08)";
        });

        // =========================
        // CLIQUE FINAL (AÇÃO)
        // =========================
        btn.addEventListener("click", () => {
            btn.innerText = "A carregar...";
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = "game.html";
            }, 1500);
        });

    });
</script>

</html>
