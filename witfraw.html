<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>App do tigre Ao</title>
    <link rel="stylesheet" href="indexa.css">
</head>



<body>
    <div id="root">
        <div role="region" aria-label="Notifications (F8)" tabindex="-1" style="pointer-events: none;">
            <ol tabindex="-1"
                class="fixed top-0 z-[100] flex max-h-screen w-full flex-col-reverse p-4 sm:bottom-0 sm:right-0 sm:top-auto sm:flex-col md:max-w-[420px]">
            </ol>
        </div>
        <section aria-label="Notifications alt+T" tabindex="-1" aria-live="polite" aria-relevant="additions text"
            aria-atomic="false"></section>
        <div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0"><img src="temple-bg-xbdkwM8g.jpg" alt="" class="w-full h-full object-cover">
                <div class="absolute inset-0"
                    style="background: linear-gradient(rgba(0, 0, 0, 0.3) 0%, rgba(139, 10, 10, 0.6) 50%, rgba(0, 0, 0, 0.85) 100%);">
                </div>
            </div>
            <div
                class=" relative z-10 w-full max-w-[380px] mx-auto px-6 fade-up min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

                <div style="opacity: 1; transform: none; width: 100%;">
                    <div class="rounded-2xl p-6 text-center"
                        style=" width: 100%;background: linear-gradient(rgba(20, 5, 5, 0.92), rgba(10, 2, 2, 0.96)); border: 1px solid rgba(218, 165, 32, 0.3); box-shadow: rgba(0, 0, 0, 0.5) 0px 0px 40px;">
                        <h1 class="text-xl font-extrabold text-card-foreground mb-1">Levantamento</h1>
                        <p class="text-sm text-muted-foreground">Escolha o meio de recebimento</p>
                        <p class="text-3xl font-extrabold my-2"
                            style="background: linear-gradient(rgb(33, 196, 93), rgb(22, 162, 73)) text; -webkit-text-fill-color: transparent;">
                            121.000 Kz</p>
                        <p class="text-xs text-muted-foreground mb-6">disponível para levantamento</p>
                        <div class="space-y-3"><button id="IBAN"
                                class="w-full flex items-center gap-4 p-4 rounded-xl text-left cursor-pointer transition-all hover:scale-[1.02]"
                                style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);"><span
                                    class="text-3xl">🏦</span>
                                <div>
                                    <p class="font-bold text-card-foreground">Registrar IBAN</p>
                                    <p class="text-xs text-muted-foreground">Transferência bancária directa</p>
                                </div>
                            </button><button id="Multicaixa"
                                class="w-full flex items-center gap-4 p-4 rounded-xl text-left cursor-pointer transition-all hover:scale-[1.02]"
                                style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);"><span
                                    class="text-3xl">📱</span>
                                <div>
                                    <p class="font-bold text-card-foreground">Registrar Multicaixa Express</p>
                                    <p class="text-xs text-muted-foreground">Receba no seu Express</p>
                                </div>
                            </button></div>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <script>
        document.querySelectorAll("button").forEach(btn => {
            if (btn.id !== "IBAN") {
                btn.addEventListener("click", function () {
                    btn.innerText = "Carregando...";
                    btn.classList.add("loading")
                    btn.disabled = true;


                    setTimeout(() => {
                        window.location.href = "witfrwbb.html"
                    })
                });
            }


            if (btn.id !== "Multicaixa") {
                btn.addEventListener("click", () => {
                    btn.innerText = "Carregando...";
                    btn.classList.add("loading");
                    btn.disabled = true;


                    setTimeout(() => {

                        window.location.href = "witfrwba.html";
                    }, 2000);

                });
            }
        });



    </script>







</body>

</html>
